services:
  - type: web
    name: sayyad-backend
    env: python
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && npm run build"
    startCommand: "gunicorn your_application.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: GEMINI_API_KEY
        sync: false
